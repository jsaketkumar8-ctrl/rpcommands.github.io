<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Government - RP Portal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">◆ RP Portal</div>
    <div class="nav-controls">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>
    </div>
  </nav>

  <!-- ADMIN INDICATOR -->
  <div class="admin-indicator" id="adminIndicator">🔒 ADMIN MODE ACTIVE</div>

  <!-- MAIN CONTENT -->
  <main>
    <div class="container">
      <!-- SECTION HEADER -->
      <div class="section-header">
        <h1>Department of Government</h1>
        <p>Official protocols and procedures for government officials</p>
      </div>

      <!-- SEARCH BAR -->
      <div class="search-container">
        <input 
          type="text" 
          class="search-box" 
          id="searchBox" 
          placeholder="Search by title, content, or category..."
        >
      </div>

      <!-- CARDS CONTAINER -->
      <div class="cards-container"></div>
    </div>
  </main>

  <!-- LOGIN MODAL -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Admin Login</h2>
        <p>Enter credentials to unlock admin features</p>
      </div>
      
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
      
      <div class="modal-buttons">
        <button class="btn-modal btn-login" id="loginBtn">Login</button>
        <button class="btn-modal btn-cancel" id="cancelBtn">Skip</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>Made by <span class="footer-gradient">Saket</span></p>
    <p>© 2026 RP Portal. All rights reserved.</p>
  </footer>

  <!-- SCRIPTS -->
  <script src="script.js"></script>
</body>
</html>
